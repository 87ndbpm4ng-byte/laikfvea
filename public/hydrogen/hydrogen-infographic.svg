<svg xmlns="http://www.w3.org/2000/svg" width="1776" height="888" viewBox="0 0 1776 888" role="img" aria-labelledby="title desc">
  <title id="title">Laikfvea hydrogen water infographic</title>
  <desc id="desc">A three-part explanation of dissolved molecular hydrogen, diffusion, and PEM SPE separation.</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&amp;display=swap');
      .text { font-family: "Montserrat", sans-serif; fill: #171717; }
      .heading { font-weight: 600; font-size: 34px; letter-spacing: -0.6px; }
      .body { font-weight: 400; font-size: 21px; fill: #3f3f3f; }
      .label { font-weight: 400; font-size: 20px; fill: #242424; }
      .note { font-weight: 400; font-size: 18px; fill: #727272; }
      .chem { font-weight: 400; font-size: 22px; fill: #303030; }
      .line { fill: none; stroke: #343434; stroke-width: 1.25; stroke-linecap: round; stroke-linejoin: round; }
      .fine { fill: none; stroke: #a8a8a8; stroke-width: 1; }
      .blue { fill: none; stroke: #52aee8; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .blue-text { font-family: "Montserrat", sans-serif; font-weight: 400; fill: #52aee8; }
      .dot { fill: #282828; }
    </style>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#52aee8"/>
    </marker>
    <marker id="arrow-grey" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#777"/>
    </marker>
  </defs>

  <rect width="1776" height="888" fill="#fff"/>

  <!-- Column dividers -->
  <path class="fine" d="M622 200V679M1175 200V679"/>

  <!-- Column 1: regular water -->
  <g aria-label="Regular water glass">
    <path class="line" d="M135 211C135 202 166 197 207 197S279 202 279 211L266 416C266 426 241 431 207 431S148 426 148 416Z"/>
    <ellipse class="line" cx="207" cy="211" rx="72" ry="14"/>
    <path class="line" d="M143 260C160 265 182 267 207 267S254 265 272 260"/>
    <path class="fine" d="M148 416C165 422 184 424 207 424S250 422 266 416"/>
    <text class="text chem" x="207" y="326" text-anchor="middle">H<tspan baseline-shift="sub" font-size="15">2</tspan>O</text>
    <text class="text label" x="207" y="470" text-anchor="middle">Regular water</text>
  </g>

  <!-- Column 1: hydrogen water -->
  <g aria-label="Hydrogen water glass">
    <path class="line" d="M353 211C353 202 384 197 425 197S497 202 497 211L484 416C484 426 459 431 425 431S366 426 366 416Z"/>
    <ellipse class="line" cx="425" cy="211" rx="72" ry="14"/>
    <path class="line" d="M361 260C378 265 400 267 425 267S472 265 490 260"/>
    <path class="fine" d="M366 416C383 422 402 424 425 424S468 422 484 416"/>
    <text class="text chem" x="411" y="310" text-anchor="middle">H<tspan baseline-shift="sub" font-size="15">2</tspan>O</text>
    <g class="blue-text" font-size="15" text-anchor="middle">
      <circle class="blue" cx="466" cy="282" r="14"/><text x="466" y="287">H<tspan baseline-shift="sub" font-size="10">2</tspan></text>
      <circle class="blue" cx="451" cy="335" r="14"/><text x="451" y="340">H<tspan baseline-shift="sub" font-size="10">2</tspan></text>
      <circle class="blue" cx="392" cy="361" r="14"/><text x="392" y="366">H<tspan baseline-shift="sub" font-size="10">2</tspan></text>
      <circle class="blue" cx="438" cy="389" r="14"/><text x="438" y="394">H<tspan baseline-shift="sub" font-size="10">2</tspan></text>
    </g>
    <text class="text label" x="425" y="470" text-anchor="middle">Hydrogen water</text>
  </g>

  <text class="text heading" x="134" y="542">More than H<tspan baseline-shift="sub" font-size="23">2</tspan>O</text>
  <text class="text body" x="134" y="594">
    <tspan x="134" dy="0">Hydrogen water contains additional</tspan>
    <tspan x="134" dy="34">molecular hydrogen dissolved in</tspan>
    <tspan x="134" dy="34">ordinary drinking water.</tspan>
  </text>

  <!-- Connector into column 2 -->
  <path class="blue" d="M586 331H655" marker-end="url(#arrow-blue)"/>

  <!-- Column 2: molecular diffusion -->
  <g aria-label="Molecular hydrogen diffusion">
    <circle class="blue" cx="713" cy="336" r="22"/>
    <text class="blue-text" x="713" y="343" font-size="20" text-anchor="middle">H<tspan baseline-shift="sub" font-size="13">2</tspan></text>
    <path class="blue" d="M744 336H792" marker-end="url(#arrow-blue)"/>
    <path class="line" d="M823 238C803 279 804 320 821 358C837 395 836 433 816 470"/>
    <path class="line" d="M871 238C851 279 852 320 869 358C885 395 884 433 864 470"/>
    <g fill="#8b8b8b">
      <circle cx="830" cy="255" r="1.4"/><circle cx="824" cy="273" r="1.4"/><circle cx="819" cy="291" r="1.4"/>
      <circle cx="817" cy="310" r="1.4"/><circle cx="819" cy="329" r="1.4"/><circle cx="826" cy="348" r="1.4"/>
      <circle cx="841" cy="381" r="1.4"/><circle cx="845" cy="402" r="1.4"/><circle cx="842" cy="426" r="1.4"/>
      <circle cx="878" cy="255" r="1.4"/><circle cx="872" cy="273" r="1.4"/><circle cx="867" cy="291" r="1.4"/>
      <circle cx="865" cy="310" r="1.4"/><circle cx="867" cy="329" r="1.4"/><circle cx="874" cy="348" r="1.4"/>
      <circle cx="889" cy="381" r="1.4"/><circle cx="893" cy="402" r="1.4"/><circle cx="890" cy="426" r="1.4"/>
    </g>
    <path class="blue" d="M900 336H947" marker-end="url(#arrow-blue)"/>
    <circle class="line" cx="1031" cy="336" r="65"/>
    <circle class="line" cx="1031" cy="336" r="47"/>
    <circle class="line" cx="1031" cy="336" r="30"/>
    <circle class="dot" cx="1031" cy="336" r="9"/>
  </g>

  <text class="text heading" x="700" y="542">Small and mobile</text>
  <text class="text body" x="700" y="594">
    <tspan x="700" dy="0">Its tiny, neutral molecules can</tspan>
    <tspan x="700" dy="34">diffuse broadly through the body.</tspan>
  </text>

  <!-- Connector into column 3 -->
  <path class="blue" d="M1140 331H1211" marker-end="url(#arrow-blue)"/>

  <!-- Column 3: PEM / SPE separation -->
  <g aria-label="PEM SPE separation">
    <path class="line" d="M1284 335H1536V351H1284Z"/>
    <rect class="line" x="1284" y="351" width="252" height="58" rx="2"/>
    <path class="line" d="M1284 409H1536V427H1284Z"/>
    <path class="fine" d="M1284 310C1320 300 1350 320 1381 310S1443 300 1474 310S1508 320 1536 310"/>
    <g fill="#565656">
      <circle cx="1301" cy="365" r="1.5"/><circle cx="1321" cy="377" r="1.5"/><circle cx="1340" cy="362" r="1.5"/>
      <circle cx="1361" cy="391" r="1.5"/><circle cx="1380" cy="371" r="1.5"/><circle cx="1402" cy="397" r="1.5"/>
      <circle cx="1423" cy="364" r="1.5"/><circle cx="1444" cy="382" r="1.5"/><circle cx="1463" cy="398" r="1.5"/>
      <circle cx="1484" cy="369" r="1.5"/><circle cx="1505" cy="390" r="1.5"/><circle cx="1523" cy="365" r="1.5"/>
    </g>
    <g class="blue">
      <path d="M1331 351V271" marker-end="url(#arrow-blue)"/>
      <path d="M1384 351V271" marker-end="url(#arrow-blue)"/>
      <path d="M1437 351V271" marker-end="url(#arrow-blue)"/>
      <path d="M1490 351V271" marker-end="url(#arrow-blue)"/>
    </g>
    <g class="blue-text" font-size="19" text-anchor="middle">
      <text x="1331" y="253">H<tspan baseline-shift="sub" font-size="12">2</tspan></text>
      <text x="1384" y="253">H<tspan baseline-shift="sub" font-size="12">2</tspan></text>
      <text x="1437" y="253">H<tspan baseline-shift="sub" font-size="12">2</tspan></text>
      <text x="1490" y="253">H<tspan baseline-shift="sub" font-size="12">2</tspan></text>
    </g>
    <path d="M1536 380H1574V371H1608" fill="none" stroke="#777" stroke-width="1.25" stroke-dasharray="4 4" marker-end="url(#arrow-grey)"/>
    <text class="text chem" x="1625" y="379">O<tspan baseline-shift="sub" font-size="15">2</tspan></text>
  </g>

  <text class="text heading" x="1245" y="542">Clean separation</text>
  <text class="text body" x="1245" y="594">
    <tspan x="1245" dy="0">PEM / SPE technology guides</tspan>
    <tspan x="1245" dy="34">hydrogen into the water while</tspan>
    <tspan x="1245" dy="34">unwanted gases leave separately.</tspan>
  </text>

  <!-- Research qualifier -->
  <path class="fine" d="M317 798H527M1291 798H1470"/>
  <text class="text note" x="888" y="805" text-anchor="middle">Research into molecular hydrogen and everyday wellness is ongoing.</text>
</svg>
